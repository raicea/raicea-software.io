<!DOCTYPE html>
<html>

<head>

<title>Raicea</title>

<style>

* {
    box-sizing: border-box;
}

body {
    position: relative;
    margin: 0;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: "Segoe UI", sans-serif;

    background: linear-gradient(
        135deg,
        #020617,
        #003b3b,
        #001b40,
        #020617
    );

    background-size: 400% 400%;
    animation: gradient 12s ease infinite;

    color: white;
    overflow: hidden;
}


@keyframes gradient {
    0% {
        background-position: 0% 50%;
    }

    50% {
        background-position: 100% 50%;
    }

    100% {
        background-position: 0% 50%;
    }
}


/* Fulger stanga */

body::before {

    content: "";

    position: absolute;

    left: 40px;
    top: 50%;

    width: 5px;
    height: 250px;

    background: linear-gradient(
        transparent,
        #00ffff,
        white,
        #00ff99,
        transparent
    );

    box-shadow:
        0 0 15px #00ffff,
        0 0 40px #00ffff;

    animation: lightning 2s infinite;

}


/* Fulger dreapta */

body::after {

    content: "";

    position: absolute;

    right: 40px;
    top: 50%;

    width: 5px;
    height: 250px;

    background: linear-gradient(
        transparent,
        #00aaff,
        white,
        #00ff99,
        transparent
    );

    box-shadow:
        0 0 15px #00aaff,
        0 0 40px #00aaff;

    animation: lightning 2s infinite reverse;

}



@keyframes lightning {

    0%,100% {
        opacity: 0.3;
        transform: scaleY(0.7);
    }

    50% {
        opacity: 1;
        transform: scaleY(1);
    }

}


/* Card */

.card {

    position: relative;
    z-index: 2;

    width: 360px;

    padding: 25px;

    text-align: center;

    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(15px);

    border-radius: 20px;

    border: 1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 0 40px rgba(0,255,200,0.2);

}


/* Titlu */

h1 {

    font-size: 38px;

    margin: 0 0 10px;

    background: linear-gradient(
        90deg,
        #00ff99,
        #00aaff
    );

    -webkit-background-clip: text;

    color: transparent;

}


p {

    margin: 10px 0 20px;

    color: #cccccc;

}



/* Butoane */

a {

    display: block;

    margin: 12px 0;

    padding: 12px;

    border-radius: 12px;

    background: linear-gradient(
        90deg,
        #00aaff,
        #00ff99
    );

    color: white;

    text-decoration: none;

    font-weight: bold;

    transition: 0.3s;

}


a:hover {

    transform: scale(1.05);

    box-shadow:
        0 0 20px #00ffaa;

}


</style>

</head>


<body>

<div class="card">

<h1>Raicea</h1>

<p>
Developer of PcCleaner<br>
Building software and creative projects.
</p>

</div>

</body>

</html>
